services:
  db:
    container_name: postgres_container
    image: postgres:14.17
    ports:
      - "5000:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/airflow_init.sql:/docker-entrypoint-initdb.d/airflow_init.sql
    networks:
      - my_network

  af:
    container_name: airflow_container
    image: weather-airflow:0.1.0
    ports:
      - "8000:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@db:5432/airflow_db
      WEATHERSTACK_API_KEY: ${WEATHERSTACK_API_KEY}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./api-request:/opt/airflow/api-request
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - '1001'
    depends_on:
      - db
    networks:
      - my_network
    command: >
      bash -c "airflow db migrate && airflow standalone"

  dbt:
      image: ghcr.io/dbt-labs/dbt-postgres:1.9.0
      volumes:
        - ./dbt/my_project:/usr/app
        - ./dbt:/root/.dbt
      working_dir: /usr/app
      environment:
        DBT_PROFILES_DIR: "/root/.dbt"
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: ${POSTGRES_DB}

      depends_on:
        - db
      networks:
        - my_network
      command: run

  superset:
      container_name: superset_container
      image: apache/superset:4.0.2
      ports:
        - "8088:8088"
      environment:
        SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      volumes:
        - superset_home:/app/superset_home
      depends_on:
        - db
      networks:
        - my_network

volumes:
  superset_home:

networks:
  my_network:
    driver: bridge
